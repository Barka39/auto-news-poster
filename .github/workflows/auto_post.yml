name: Auto News Poster

on:
  # Public repo болсон тул Actions minutes хязгааргүй — цагийн
  # идэвхжилтэй тохируулсан 3 давхаргатай товлолт (Монгол UTC+8):
  #   - Оройн peak (МН 19:00-22:59) = UTC 11-14  → 15 минут тутам
  #   - Өдрийн цаг (МН 08:00-18:59) = UTC 0-10   → 30 минут тутам
  #   - Шөнийн цаг (МН 23:00-07:59) = UTC 15-23  → 60 минут тутам
  schedule:
    - cron: "*/15 11-14 * * *"
    - cron: "*/30 0-10 * * *"
    - cron: "0 15-23 * * *"

  workflow_dispatch:

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout кодыг татах
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python тохируулах
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Dependencies суулгах
        run: pip install -r requirements.txt

      - name: Мэдээ татаж постлох
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: posted_ids.json commit хийх
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add posted_ids.json || true
          git diff --staged --quiet || git commit -m "posted_ids шинэчлэгдлээ [skip ci]"
          git push || true
